<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <link rel="stylesheet" type="text/css" href="index.css" />
    <link rel="stylesheet" type="text/css" href="./fonts/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  </head>
  <body>
    <div class="chatbot-container">
      <div class="chatbot-message-intro">
        <img height="50px" width="50px" alt="OpenAI's logo" src="./logo.png" id="logo" />
      </div>
      <div class="chatbot-greeting" id="chatbot-greeting">
        Hello, what can I do for you today?
      </div>
      <div class="chatbot-messages" id="chatbot-messages"></div>
      <div
          id="attached-file-icon"
          class="attached-file-icon"
          style="display: none;"
        >
          <div id="file">
            <i class="fas fa-file"></i>
            <div id="file-name"></div>
            <i id="file-remover" class="fas fa-times"></i>
          </div>
        </div>
      <form class="chatbot-input">
        <textarea
          id="chatbot-input"
          type="text"
          placeholder="Type your message..."
        ></textarea>
        <i class="fas fa-send"></i>
        <label for="file-input" class="file-upload-btn">
          <input id="file-input" type="file" />
        </label>
      </form>
    </div>
    <script type="module" src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
